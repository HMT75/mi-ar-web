<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>WebAR MindAR</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<script>
AFRAME.registerComponent("drag-rotate", {
  init: function () {
    this.ifMouseDown = false;
    this.x = 0;
    this.el.sceneEl.canvas.addEventListener("mousedown", e => {
      this.ifMouseDown = true;
      this.x = e.clientX;
    });
    window.addEventListener("mouseup", () => {
      this.ifMouseDown = false;
    });
    window.addEventListener("mousemove", e => {
      if (!this.ifMouseDown) return;
      let deltaX = e.clientX - this.x;
      this.x = e.clientX;
      let rotation = this.el.getAttribute("rotation");
      rotation.y += deltaX * 0.5;
      this.el.setAttribute("rotation", rotation);
    });
  }
});

AFRAME.registerComponent("pinch-scale", {
  schema: { min: {default: 0.2}, max: {default: 3} },
  init: function () {
    this.initialScale = this.el.object3D.scale.clone();
    this.scaleFactor = 1;

    this.el.sceneEl.addEventListener("twofingermove", (e) => {
      this.scaleFactor *= 1 + e.detail.spreadChange / 200;
      this.scaleFactor = Math.min(this.schema.max, Math.max(this.schema.min, this.scaleFactor));
      this.el.object3D.scale.set(
        this.initialScale.x * this.scaleFactor,
        this.initialScale.y * this.scaleFactor,
        this.initialScale.z * this.scaleFactor
      );
    });
  }
});
</script>

<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
}
</style>
</head>

<body>
<a-scene
  mindar-image="imageTargetSrc: targets.mind;"
  embedded
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>

  <a-entity mindar-image-target="targetIndex: 0">
    <a-entity
      gltf-model="url(model.glb)"
      position="0 0 0"
      scale="0.5 0.5 0.5"
      drag-rotate
      pinch-scale
    ></a-entity>
  </a-entity>

  <a-camera look-controls="enabled: false"></a-camera>
</a-scene>
</body>
</html>
