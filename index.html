<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />

    <title>MindAR Test</title>

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

    <!-- MindAR -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <!-- GESTURES (necesario) -->
    <script src="https://cdn.jsdelivr.net/npm/aframe-gesture-detector@4.0.0/dist/aframe-gesture-detector.min.js"></script>

    <script>
      AFRAME.registerComponent("rotate-scale", {
        schema: {
          scaleMin: { default: 0.05 },
          scaleMax: { default: 2 }
        },

        init: function () {
          this.startScale = this.el.object3D.scale.clone();
        },

        tick: function () {
          this.el.sceneEl.addEventListener("onefingermove", (e) => {
            this.el.object3D.rotation.y += e.detail.positionChange.x * 0.01;
          });

          this.el.sceneEl.addEventListener("twofingermove", (e) => {
            let scale = this.el.object3D.scale.x + e.detail.spreadChange * 0.005;
            scale = Math.min(this.data.scaleMax, Math.max(this.data.scaleMin, scale));
            this.el.object3D.scale.set(scale, scale, scale);
          });
        }
      });
    </script>

    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
    </style>
  </head>

  <body>
    <a-scene
      mindar-image="imageTargetSrc: targets.mind;"
      embedded
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      gesture-detector
    >

      <a-assets>
        <a-asset-item id="model" src="assets/model.glb"></a-asset-item>
      </a-assets>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-gltf-model
          src="#model"
          scale="0.2 0.2 0.2"
          position="0 0 0"
          rotation="0 0 0"
          rotate-scale
        ></a-gltf-model>
      </a-entity>

      <a-camera look-controls="enabled: false"></a-camera>
    </a-scene>
  </body>
</html>
