<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Piel y Tejidos Blandos</title>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      html, body {
        margin: 0; padding: 0;
        width: 100%; height: 100%;
        overflow: hidden;
      }

      /* ══ SPLASH ══ */
      #splash {
        position: fixed; inset: 0; z-index: 99999;
        background: linear-gradient(160deg, #0a1628 0%, #102040 60%, #0e2a1a 100%);
        display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 24px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        transition: opacity 0.6s ease;
      }
      #splash.oculto { opacity: 0; pointer-events: none; }

      #splash-img {
        width: 100px; height: 100px;
        object-fit: contain; border-radius: 20px; display: none;
      }
      #splash-img.cargada { display: block; }
      #splash-icon { font-size: 75px; line-height: 1; }

      #splash-titulo {
        color: #fff; font-size: 18px; font-weight: 600;
        text-align: center; line-height: 1.4; max-width: 260px;
      }
      #splash-sub { color: rgba(255,255,255,0.4); font-size: 13px; }

      .barra-wrap {
        width: 160px; height: 3px;
        background: rgba(255,255,255,0.12); border-radius: 10px; overflow: hidden;
      }
      .barra-fill {
        height: 100%; background: #1d9e75; border-radius: 10px;
        animation: carga 2.5s ease-in-out forwards;
      }
      @keyframes carga { 0%{width:0%} 40%{width:55%} 80%{width:85%} 100%{width:100%} }

      /* ══ UI GENERAL ══ */
      #btn-back {
        position: fixed; top: 14px; left: 14px; z-index: 9999;
        background: rgba(10,22,40,0.78);
        border: 1px solid rgba(255,255,255,0.25);
        color: #fff; border-radius: 22px;
        padding: 8px 18px; font-size: 14px;
        font-family: -apple-system, sans-serif; cursor: pointer;
        display: none;
      }

      #estado {
        position: fixed; top: 14px; right: 14px; z-index: 9999;
        background: rgba(10,22,40,0.78);
        border: 1px solid rgba(255,255,255,0.2);
        color: #fff; border-radius: 22px;
        padding: 8px 16px; font-size: 12px;
        font-family: -apple-system, sans-serif;
        display: none; align-items: center; gap: 8px;
      }
      #dot {
        width: 8px; height: 8px; border-radius: 50%;
        background: #f59e0b; animation: blink 1.3s infinite; flex-shrink: 0;
      }
      #dot.ok { background: #22c55e; animation: none; }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }

      #hint {
        position: fixed; bottom: 230px; left: 50%;
        transform: translateX(-50%); z-index: 9999;
        background: rgba(10,22,40,0.78); color: #fff;
        border-radius: 14px; padding: 12px 22px; font-size: 14px;
        font-family: -apple-system, sans-serif;
        text-align: center; line-height: 1.5; max-width: 280px;
        border: 1px solid rgba(255,255,255,0.15);
        transition: opacity 0.5s; display: none;
      }

      /* ══ BOTONES DE CONTROL DEL MODELO ══ */
      #controles {
        position: fixed; right: 14px; bottom: 210px;
        z-index: 9999;
        display: none; /* se muestra al activar el modelo */
        flex-direction: column; gap: 10px;
        align-items: center;
      }
      #controles.visible { display: flex; }

      .ctrl-btn {
        width: 50px; height: 50px; border-radius: 50%;
        background: rgba(10,22,40,0.85);
        border: 1.5px solid rgba(255,255,255,0.25);
        color: #fff; font-size: 20px;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer; font-family: -apple-system, sans-serif;
        -webkit-tap-highlight-color: transparent;
        transition: background 0.15s, transform 0.1s;
        position: relative;
      }
      .ctrl-btn:active { transform: scale(0.93); }
      .ctrl-btn.girando { background: #1d9e75; border-color: #1d9e75; }
      .ctrl-btn.recalc-activo { background: #1d4ed8; border-color: #1d4ed8; }

      /* Tooltip de botón */
      .ctrl-tip {
        position: absolute; right: 58px; top: 50%;
        transform: translateY(-50%);
        background: rgba(10,22,40,0.9);
        color: rgba(255,255,255,0.8);
        font-size: 11px; white-space: nowrap;
        padding: 4px 10px; border-radius: 8px;
        border: 1px solid rgba(255,255,255,0.15);
        pointer-events: none;
      }

      /* ══ PANEL INFERIOR ══ */
      #panel {
        position: fixed; bottom: 0; left: 0; right: 0; z-index: 9999;
        background: rgba(10,22,40,0.94);
        border-top: 1px solid rgba(255,255,255,0.12);
        padding: 14px 16px 30px;
        font-family: -apple-system, sans-serif;
        display: none;
      }
      #panel.visible { display: block; }

      .plabel {
        font-size: 10px; letter-spacing: 1.4px; text-transform: uppercase;
        color: rgba(255,255,255,0.35); text-align: center; margin-bottom: 14px;
      }

      .numeros { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

      .nbtn {
        width: 46px; height: 46px; border-radius: 50%;
        background: rgba(255,255,255,0.08);
        border: 1.5px solid rgba(255,255,255,0.22);
        color: #fff; font-size: 17px; font-weight: 700;
        cursor: pointer; display: flex; align-items: center; justify-content: center;
        font-family: -apple-system, sans-serif; transition: background 0.15s;
        -webkit-tap-highlight-color: transparent;
      }
      .nbtn.activo { background: #1d9e75; border-color: #1d9e75; }

      #infocard {
        display: none; margin-top: 14px;
        background: rgba(255,255,255,0.07);
        border: 1px solid rgba(255,255,255,0.13);
        border-radius: 14px; padding: 14px 16px;
      }
      #infocard.visible { display: block; }

      #info-cerrar {
        float: right; background: none; border: none;
        color: rgba(255,255,255,0.4); font-size: 22px;
        cursor: pointer; line-height: 1;
      }
      #info-titulo { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 6px; overflow: hidden; }
      #info-texto  { font-size: 13px; color: rgba(255,255,255,0.68); line-height: 1.7; }

      /* ══ FEEDBACK VISUAL DE ROTACIÓN ══ */
      #rotacion-badge {
        position: fixed; top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        z-index: 9998; pointer-events: none;
        background: rgba(29,158,117,0.9);
        color: #fff; border-radius: 14px;
        padding: 10px 20px; font-size: 14px; font-weight: 600;
        font-family: -apple-system, sans-serif;
        opacity: 0; transition: opacity 0.3s;
      }
      #rotacion-badge.show { opacity: 1; }
    </style>
  </head>
  <body>

    <!-- ══ SPLASH ══ -->
    <div id="splash">
      <img id="splash-img" src="assets/logo.png"
        onload="this.classList.add('cargada'); document.getElementById('splash-icon').style.display='none';"
        onerror="this.style.display='none';" alt="Logo"/>
      <div id="splash-icon">🔬</div>
      <div id="splash-titulo">Infección de Piel<br>y Tejidos Blandos</div>
      <div class="barra-wrap"><div class="barra-fill"></div></div>
      <div id="splash-sub">Iniciando cámara AR...</div>
    </div>

    <!-- ══ UI ══ -->
    <button id="btn-back" onclick="location.href='index.html'">← Volver</button>

    <div id="estado">
      <div id="dot"></div>
      <span id="estado-txt">Buscando marcador...</span>
    </div>

    <div id="hint">📷 Apunta la cámara al marcador para activar el modelo 3D</div>

    <!-- Feedback rotación -->
    <div id="rotacion-badge">↻ Rotando 90°</div>

    <!-- ══ BOTONES CONTROL MODELO (derecha) ══ -->
    <div id="controles">

      <!-- Rotar 90° a la derecha -->
      <div class="ctrl-btn" id="btn-rotar" onclick="rotarModelo()">
        ↻
        <div class="ctrl-tip">Rotar 90°</div>
      </div>

      <!-- Recalcular tracking -->
      <div class="ctrl-btn" id="btn-recalc" onclick="recalcularTracking()">
        ⟳
        <div class="ctrl-tip">Recalcular</div>
      </div>

    </div>

    <!-- ══ ESCENA AR — base original de Oscar ══ -->
    <a-scene
      mindar-image="imageTargetSrc: assets/targets.mind;"
      embedded
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets>
        <a-asset-item id="model" src="assets/model.glb"></a-asset-item>
      </a-assets>

      <a-entity mindar-image-target="targetIndex: 0" id="target-entity">
        <!-- Padre: maneja SOLO la rotación Y del carrusel -->
        <a-entity id="contenedor-carrusel" rotation="0 0 0" visible="false">
          <!-- Hijo: orientación base fija — no se toca nunca -->
          <a-gltf-model
            id="mi-modelo"
            src="#model"
            position="0 0 0"
            rotation="0 0 0"
            scale="0.2 0.2 0.2"
          ></a-gltf-model>
        </a-entity>
      </a-entity>

      <a-camera look-controls="enabled: false"></a-camera>
    </a-scene>

    <!-- ══ PANEL CAPAS ══ -->
    <div id="panel">
      <div class="plabel">Capas histológicas — toca un número</div>
      <div class="numeros" id="numeros"></div>
      <div id="infocard">
        <button id="info-cerrar" onclick="cerrarInfo()">×</button>
        <div id="info-titulo"></div>
        <div id="info-texto"></div>
      </div>
    </div>

    <script>
      /* ══ CAPAS HISTOLÓGICAS ══ */
      const CAPAS = [
        {
          n: 1, nombre: "Epidermis",
          texto: "Epitelio escamoso estratificado queratinizado. 4–5 estratos: córneo, lúcido (palmas/plantas), granuloso, espinoso y basal. Los queratinocitos migran desde la capa basal hasta descamarse en ~28 días. Grosor: 0.05–1.5 mm."
        },
        {
          n: 2, nombre: "Dermis papilar",
          texto: "Tejido conectivo laxo superficial. Forma papilas dérmicas que interdigitan con la epidermis. Rica en capilares y corpúsculos de Meissner (tacto fino). Fibras delgadas de colágeno tipo I y III."
        },
        {
          n: 3, nombre: "Dermis reticular",
          texto: "Tejido conectivo denso irregular. Haces gruesos de colágeno tipo I. Alberga folículos pilosos, glándulas sebáceas, sudoríparas y corpúsculos de Pacini (presión profunda)."
        },
        {
          n: 4, nombre: "Hipodermis",
          texto: "Tejido adiposo subcutáneo. Adipocitos en lobulillos separados por tabiques fibrosos. Función: aislamiento térmico, reserva energética y amortiguación mecánica."
        },
        {
          n: 5, nombre: "Anexos cutáneos",
          texto: "Derivados de la epidermis: folículo piloso (produce el pelo), glándulas sebáceas (lubricación), glándulas ecrinas (sudor → termorregulación), glándulas apocrinas (axilas/ingles). Uñas: placas de queratina dura."
        }
      ];

      /* ══ ESTADO ══ */
      let modeloActivado  = false;
      let trackingPausado = false;
      let rotacionActual  = 0;   // grados acumulados en Y (sobre el eje de rotación del modelo)
      let sistemaMindar   = null;

      /* ══ DOM ══ */
      const splash     = document.getElementById('splash');
      const btnBack    = document.getElementById('btn-back');
      const estadoEl   = document.getElementById('estado');
      const dot        = document.getElementById('dot');
      const estadoTxt  = document.getElementById('estado-txt');
      const hint       = document.getElementById('hint');
      const panel      = document.getElementById('panel');
      const controles  = document.getElementById('controles');
      const numeros    = document.getElementById('numeros');
      const infocard   = document.getElementById('infocard');
      const badge      = document.getElementById('rotacion-badge');
      const btnRotar   = document.getElementById('btn-rotar');
      const btnRecalc  = document.getElementById('btn-recalc');

      /* ══ BOTONES DE CAPAS ══ */
      CAPAS.forEach(capa => {
        const btn = document.createElement('button');
        btn.className   = 'nbtn';
        btn.textContent = capa.n;
        btn.onclick = () => mostrarInfo(capa, btn);
        numeros.appendChild(btn);
      });

      function mostrarInfo(capa, btn) {
        document.querySelectorAll('.nbtn').forEach(b => b.classList.remove('activo'));
        btn.classList.add('activo');
        document.getElementById('info-titulo').textContent = `${capa.n}. ${capa.nombre}`;
        document.getElementById('info-texto').textContent  = capa.texto;
        infocard.classList.add('visible');
      }

      function cerrarInfo() {
        infocard.classList.remove('visible');
        document.querySelectorAll('.nbtn').forEach(b => b.classList.remove('activo'));
      }

      /* ══════════════════════════════════════════
         ROTAR MODELO 90° sobre el eje Y del modelo
         El modelo base tiene rotation="90 0 0"
         Giramos el eje Y (segundo valor) en pasos de 90°
         ══════════════════════════════════════════ */
      function rotarModelo() {
        const contenedor = document.getElementById('contenedor-carrusel');
        if (!contenedor) return;

        rotacionActual = (rotacionActual + 90) % 360;

        /* Giramos SOLO el eje Y del contenedor padre.
           El modelo hijo mantiene su rotation="0 0 0" intacta.
           Así el carrusel nunca desajusta la orientación base. */
        contenedor.setAttribute('rotation', `0 ${rotacionActual} 0`);

        /* Feedback visual */
        btnRotar.classList.add('girando');
        badge.textContent = `↻ ${rotacionActual}°`;
        badge.classList.add('show');

        setTimeout(() => {
          btnRotar.classList.remove('girando');
          badge.classList.remove('show');
        }, 800);
      }

      /* ══════════════════════════════════════════
         RECALCULAR TRACKING
         Reactiva MindAR por 2 segundos para que
         reposicione el modelo, luego pausa de nuevo
         ══════════════════════════════════════════ */
      function recalcularTracking() {
        if (!sistemaMindar || !trackingPausado) return;

        btnRecalc.classList.add('recalc-activo');
        estadoTxt.textContent = 'Recalculando...';
        dot.classList.remove('ok');

        /* Reanudar tracking */
        try {
          sistemaMindar.controller.startProcessVideo();
        } catch(e) {
          try { sistemaMindar.unpause(); } catch(e2) {}
        }
        trackingPausado = false;

        /* Pausa de nuevo tras 2.5 segundos */
        setTimeout(() => {
          pausarTracking();
          btnRecalc.classList.remove('recalc-activo');
          dot.classList.add('ok');
          estadoTxt.textContent = 'Modelo activo ✓';
        }, 2500);
      }

      /* ══════════════════════════════════════════
         PAUSAR TRACKING (reutilizable)
         ══════════════════════════════════════════ */
      function pausarTracking() {
        if (!sistemaMindar || trackingPausado) return;
        try {
          sistemaMindar.controller.stopProcessVideo();
        } catch(e) {
          try { sistemaMindar.pause(); } catch(e2) {}
        }
        trackingPausado = true;
      }

      /* ══════════════════════════════════════════
         ESCENA AR
         ══════════════════════════════════════════ */
      const scene = document.querySelector('a-scene');

      scene.addEventListener('loaded', () => {

        /* Ocultar splash */
        splash.classList.add('oculto');
        setTimeout(() => { splash.style.display = 'none'; }, 700);

        /* Mostrar UI */
        btnBack.style.display  = 'block';
        estadoEl.style.display = 'flex';
        hint.style.display     = 'block';

        sistemaMindar = scene.systems['mindar-image-system'];

        const targetEntity = document.getElementById('target-entity');
        const contenedor   = document.getElementById('contenedor-carrusel');

        /* TARGET DETECTADO */
        targetEntity.addEventListener('targetFound', () => {
          if (modeloActivado) return;
          modeloActivado = true;

          /* Mostrar contenedor padre (el modelo hijo ya es visible dentro) */
          contenedor.setAttribute('visible', 'true');

          /* Pausar tracking tras 400ms */
          setTimeout(() => { pausarTracking(); }, 400);

          /* UI */
          dot.classList.add('ok');
          estadoTxt.textContent = 'Modelo activo ✓';
          hint.style.opacity    = '0';
          setTimeout(() => { hint.style.display = 'none'; }, 500);
          panel.classList.add('visible');
          controles.classList.add('visible');
        });

        /* TARGET PERDIDO — contenedor permanece visible */
        targetEntity.addEventListener('targetLost', () => {
          if (!modeloActivado) return;
          estadoTxt.textContent = 'Modelo fijo ✓';
        });

      });
    </script>

  </body>
</html>
