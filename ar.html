<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Piel y Tejidos Blandos</title>

    <!-- Versiones originales de Oscar — cámara funciona con estas -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      html, body {
        margin: 0; padding: 0;
        width: 100%; height: 100%;
        overflow: hidden;
      }

      /* ══════════════════════════════════════
         PANTALLA DE CARGA PERSONALIZADA
         Colores del index: #0a1628 → #102040 → #0e2a1a
         ══════════════════════════════════════ */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        background: linear-gradient(160deg, #0a1628 0%, #102040 60%, #0e2a1a 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
        transition: opacity 0.6s ease;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      #splash.oculto {
        opacity: 0;
        pointer-events: none;
      }

      /* Logo / imagen de carga
         INSTRUCCIONES PARA AGREGAR TU IMAGEN:
         1. Sube tu imagen a la carpeta assets/ con el nombre "logo.png"
         2. El <img> de abajo la mostrará automáticamente
         Si no tienes imagen, se muestra el ícono de texto por defecto */
      #splash-img {
        width: 110px;
        height: 110px;
        object-fit: contain;
        border-radius: 22px;
        /* Si la imagen no carga, el elemento queda invisible */
        display: none;
      }
      #splash-img.cargada {
        display: block;
      }

      /* Ícono fallback si no hay imagen */
      #splash-icon {
        font-size: 64px;
        line-height: 1;
      }

      #splash-titulo {
        color: #fff;
        font-size: 18px;
        font-weight: 600;
        text-align: center;
        line-height: 1.4;
        max-width: 260px;
      }

      #splash-sub {
        color: rgba(255,255,255,0.45);
        font-size: 13px;
        text-align: center;
      }

      /* Barra de progreso animada */
      .barra-wrap {
        width: 180px;
        height: 3px;
        background: rgba(255,255,255,0.12);
        border-radius: 10px;
        overflow: hidden;
      }
      .barra-fill {
        height: 100%;
        background: #1d9e75;
        border-radius: 10px;
        animation: cargar 2.5s ease-in-out forwards;
      }
      @keyframes cargar {
        0%   { width: 0%; }
        40%  { width: 60%; }
        80%  { width: 85%; }
        100% { width: 100%; }
      }

      /* ══════════════════════════════════════
         UI ENCIMA DE LA CÁMARA
         ══════════════════════════════════════ */

      /* Botón volver */
      #btn-back {
        position: fixed;
        top: 14px; left: 14px;
        z-index: 9999;
        background: rgba(10,22,40,0.75);
        border: 1px solid rgba(255,255,255,0.25);
        color: #fff;
        border-radius: 22px;
        padding: 8px 18px;
        font-size: 14px;
        font-family: -apple-system, sans-serif;
        cursor: pointer;
        display: none; /* se muestra después del splash */
      }

      /* Indicador estado */
      #estado {
        position: fixed;
        top: 14px; right: 14px;
        z-index: 9999;
        background: rgba(10,22,40,0.75);
        border: 1px solid rgba(255,255,255,0.2);
        color: #fff;
        border-radius: 22px;
        padding: 8px 16px;
        font-size: 12px;
        font-family: -apple-system, sans-serif;
        display: none; /* se muestra después del splash */
        align-items: center;
        gap: 8px;
      }
      #dot {
        width: 8px; height: 8px; border-radius: 50%;
        background: #f59e0b;
        animation: blink 1.3s infinite;
        flex-shrink: 0;
      }
      #dot.ok { background: #22c55e; animation: none; }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }

      /* Instrucción */
      #hint {
        position: fixed;
        bottom: 220px; left: 50%;
        transform: translateX(-50%);
        z-index: 9999;
        background: rgba(10,22,40,0.75);
        color: #fff;
        border-radius: 14px;
        padding: 12px 22px;
        font-size: 14px;
        font-family: -apple-system, sans-serif;
        text-align: center;
        line-height: 1.5;
        max-width: 280px;
        border: 1px solid rgba(255,255,255,0.15);
        transition: opacity 0.5s;
        display: none;
      }

      /* Panel flotante inferior */
      #panel {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        z-index: 9999;
        background: rgba(10,22,40,0.94);
        border-top: 1px solid rgba(255,255,255,0.12);
        padding: 14px 16px 30px;
        font-family: -apple-system, sans-serif;
        display: none;
      }
      #panel.visible { display: block; }

      .plabel {
        font-size: 10px;
        letter-spacing: 1.4px;
        text-transform: uppercase;
        color: rgba(255,255,255,0.35);
        text-align: center;
        margin-bottom: 14px;
      }

      .numeros {
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
      }

      .nbtn {
        width: 46px; height: 46px;
        border-radius: 50%;
        background: rgba(255,255,255,0.08);
        border: 1.5px solid rgba(255,255,255,0.22);
        color: #fff;
        font-size: 17px; font-weight: 700;
        cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        font-family: -apple-system, sans-serif;
        transition: background 0.15s;
      }
      .nbtn.activo { background: #1d9e75; border-color: #1d9e75; }

      /* Tarjeta info */
      #infocard {
        display: none;
        margin-top: 14px;
        background: rgba(255,255,255,0.07);
        border: 1px solid rgba(255,255,255,0.13);
        border-radius: 14px;
        padding: 14px 16px;
      }
      #infocard.visible { display: block; }

      #info-cerrar {
        float: right;
        background: none; border: none;
        color: rgba(255,255,255,0.4);
        font-size: 22px; cursor: pointer;
        line-height: 1;
        font-family: -apple-system, sans-serif;
      }
      #info-titulo {
        font-size: 15px; font-weight: 700;
        color: #fff; margin-bottom: 6px;
        overflow: hidden;
      }
      #info-texto {
        font-size: 13px;
        color: rgba(255,255,255,0.68);
        line-height: 1.7;
      }
    </style>
  </head>
  <body>

    <!-- ══════════════════════════════════════
         PANTALLA DE CARGA
         ══════════════════════════════════════ -->
    <div id="splash">

      <!--
        PARA AGREGAR TU IMAGEN DE CARGA:
        1. Sube tu imagen a: assets/logo.png
        2. El código la detecta automáticamente
        Si no existe, aparece el ícono de célula por defecto
      -->
      <img id="splash-img" src="assets/logo.png"
           onload="this.classList.add('cargada'); document.getElementById('splash-icon').style.display='none';"
           onerror="this.style.display='none';"
           alt="Logo"/>
      <div id="splash-icon">🫁</div>

      <div id="splash-titulo">Infección de Piel<br>y Tejidos Blandos</div>

      <div class="barra-wrap">
        <div class="barra-fill"></div>
      </div>

      <div id="splash-sub">Iniciando cámara AR...</div>
    </div>

    <!-- ══════════════════════════════════════
         BOTONES UI (ocultos hasta que carga)
         ══════════════════════════════════════ -->
    <button id="btn-back" onclick="location.href='index.html'">← Volver</button>

    <div id="estado">
      <div id="dot"></div>
      <span id="estado-txt">Buscando marcador...</span>
    </div>

    <div id="hint">📷 Apunta la cámara al marcador para activar el modelo 3D</div>

    <!-- ══════════════════════════════════════
         ESCENA AR — base original de Oscar
         ══════════════════════════════════════ -->
    <a-scene
      mindar-image="imageTargetSrc: assets/targets.mind;"
      embedded
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets>
        <a-asset-item id="model" src="assets/model.glb"></a-asset-item>
      </a-assets>

      <a-entity mindar-image-target="targetIndex: 0" id="target-entity">
        <a-gltf-model
          id="mi-modelo"
          src="#model"
          position="0 -0.02 0"
          rotation="90 0 0"
          scale="0.2 0.2 0.2"
          visible="false"
        ></a-gltf-model>
      </a-entity>

      <a-camera look-controls="enabled: false"></a-camera>
    </a-scene>

    <!-- ══════════════════════════════════════
         PANEL DE CAPAS HISTOLÓGICAS
         ══════════════════════════════════════ -->
    <div id="panel">
      <div class="plabel">Capas histológicas — toca un número</div>
      <div class="numeros" id="numeros"></div>
      <div id="infocard">
        <button id="info-cerrar" onclick="cerrarInfo()">×</button>
        <div id="info-titulo"></div>
        <div id="info-texto"></div>
      </div>
    </div>

    <script>
      /* ══════════════════════════════════════════
         CAPAS HISTOLÓGICAS
         ══════════════════════════════════════════ */
      const CAPAS = [
        {
          n: 1, nombre: "Epidermis",
          texto: "Epitelio escamoso estratificado queratinizado. 4–5 estratos: córneo, lúcido (palmas/plantas), granuloso, espinoso y basal. Los queratinocitos migran desde la capa basal hasta descamarse en ~28 días. Grosor: 0.05–1.5 mm."
        },
        {
          n: 2, nombre: "Dermis papilar",
          texto: "Tejido conectivo laxo superficial. Forma papilas dérmicas que interdigitan con la epidermis. Rica en capilares y corpúsculos de Meissner (tacto fino). Fibras delgadas de colágeno tipo I y III."
        },
        {
          n: 3, nombre: "Dermis reticular",
          texto: "Tejido conectivo denso irregular. Haces gruesos de colágeno tipo I que dan resistencia mecánica. Alberga folículos pilosos, glándulas sebáceas, glándulas sudoríparas y corpúsculos de Pacini (presión profunda)."
        },
        {
          n: 4, nombre: "Hipodermis",
          texto: "Tejido adiposo subcutáneo. Adipocitos en lobulillos separados por tabiques fibrosos. Función: aislamiento térmico, reserva energética y amortiguación. Contiene vasos y nervios de mayor calibre."
        },
        {
          n: 5, nombre: "Anexos cutáneos",
          texto: "Derivados de la epidermis: folículo piloso (produce el pelo), glándulas sebáceas (sebo → lubricación), glándulas ecrinas (sudor acuoso → termorregulación), glándulas apocrinas (axilas, ingles). Uñas: placas de queratina dura."
        }
      ];

      /* ══════════════════════════════════════════
         REFERENCIAS DOM
         ══════════════════════════════════════════ */
      const splash   = document.getElementById('splash');
      const btnBack  = document.getElementById('btn-back');
      const estadoEl = document.getElementById('estado');
      const dot      = document.getElementById('dot');
      const estadoTxt= document.getElementById('estado-txt');
      const hint     = document.getElementById('hint');
      const panel    = document.getElementById('panel');
      const numeros  = document.getElementById('numeros');
      const infocard = document.getElementById('infocard');

      /* ── Generar botones ── */
      CAPAS.forEach(capa => {
        const btn = document.createElement('button');
        btn.className   = 'nbtn';
        btn.textContent = capa.n;
        btn.onclick = () => mostrarInfo(capa, btn);
        numeros.appendChild(btn);
      });

      function mostrarInfo(capa, btn) {
        document.querySelectorAll('.nbtn').forEach(b => b.classList.remove('activo'));
        btn.classList.add('activo');
        document.getElementById('info-titulo').textContent = `${capa.n}. ${capa.nombre}`;
        document.getElementById('info-texto').textContent  = capa.texto;
        infocard.classList.add('visible');
      }

      function cerrarInfo() {
        infocard.classList.remove('visible');
        document.querySelectorAll('.nbtn').forEach(b => b.classList.remove('activo'));
      }

      /* ══════════════════════════════════════════
         LÓGICA AR + ANTI-PARPADEO
         ══════════════════════════════════════════ */
      let modeloActivado = false;
      let sistemaMindar  = null;

      const scene = document.querySelector('a-scene');

      scene.addEventListener('loaded', () => {

        /* ── Ocultar splash cuando la escena está lista ── */
        splash.classList.add('oculto');
        setTimeout(() => { splash.style.display = 'none'; }, 700);

        /* Mostrar UI */
        btnBack.style.display  = 'block';
        estadoEl.style.display = 'flex';
        hint.style.display     = 'block';

        /* Guardar referencia al sistema de MindAR */
        sistemaMindar = scene.systems['mindar-image-system'];

        const targetEntity = document.getElementById('target-entity');
        const modelo       = document.getElementById('mi-modelo');

        /* ── TARGET DETECTADO ── */
        targetEntity.addEventListener('targetFound', () => {

          if (modeloActivado) return; /* Solo actuar la primera vez */
          modeloActivado = true;

          /* 1. Mostrar modelo */
          modelo.setAttribute('visible', 'true');

          /* 2. PAUSAR EL TRACKING — aquí está la clave anti-parpadeo:
                Después de detectar el target, detenemos el worker
                de procesamiento de MindAR. El modelo queda congelado
                en la posición donde fue detectado. Sin tracking activo
                = sin parpadeo = ahorro de CPU/GPU */
          setTimeout(() => {
            try {
              if (sistemaMindar && sistemaMindar.controller) {
                /* Pausar el procesamiento de frames del worker */
                sistemaMindar.controller.stopProcessVideo();
              }
            } catch(e) {
              /* Si stopProcessVideo no existe en esta versión,
                 usamos el método alternativo */
              try {
                sistemaMindar.pause();
              } catch(e2) { /* silencioso */ }
            }
          }, 300); /* 300ms de margen para que el modelo se posicione */

          /* 3. UI */
          dot.classList.add('ok');
          estadoTxt.textContent = 'Modelo activo ✓';
          hint.style.opacity    = '0';
          setTimeout(() => { hint.style.display = 'none'; }, 500);
          panel.classList.add('visible');
        });

        /* ── TARGET PERDIDO ──
           Con el tracking pausado esto no debería ocurrir,
           pero por si acaso: mantenemos el modelo visible */
        targetEntity.addEventListener('targetLost', () => {
          if (!modeloActivado) return;
          estadoTxt.textContent = 'Modelo fijo ✓';
          /* NO ocultamos el modelo */
        });

      });
    </script>

  </body>
</html>
